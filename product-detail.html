        @media (max-width: 768px) { .product-container { grid-template-columns: 1fr; } }

    function getProductId() {
        return parseInt(new URLSearchParams(window.location.search).get('id'));
    }

    function formatPrice(price) {
        return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function showToast(message, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#dc3545' : '#1a1a1a';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function saveOrderToSupabase(orderData) {
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'Prefer': 'return=representation'
                },
                body: JSON.stringify({
                    phone: orderData.phone,
                    product_name: orderData.product_name,
                    payment_method: orderData.payment_method,
                    payment_status: "Pending",
                    order_status: "Pending",
                    status: "Pending",
                    created_at: new Date().toISOString()
                })
            });

            if (response.ok) {
                showToast('✅ Order saved to database!');
                return true;
            } else {
                showToast('⚠️ Order placed but database save failed', true);
                return false;
            }
        } catch (error) {
            showToast('⚠️ Order placed but database save failed', true);
            return false;
        }
    }

    function renderProduct() {
        const productId = getProductId();
        const product = allProducts[productId];
        const container = document.getElementById('productContainer');

        if (!product) {
            container.innerHTML = `<div style="grid-column: span 2; text-align: center;"><h2>❌ Product Not Found (ID: ${productId})</h2><p>Product with ID ${productId} does not exist.</p><a href="index.html" class="back-btn">← Back to Home</a></div>`;
            return;
        }

        const finalPrice = product.discount > 0 ? Math.round(product.price * (1 - product.discount / 100)) : product.price;
        let quantity = 1;

        container.innerHTML = `
            <div class="product-image">
                <img src="${product.image}" alt="${product.name}">
            </div>
            <div>
                <h1 class="product-title">${product.name}</h1>
                <div class="product-brand">${product.brand}</div>
                <div class="price">
                    ₨ ${formatPrice(finalPrice)}
                    ${product.oldPrice > 0 ? `<span class="old-price">₨ ${formatPrice(product.oldPrice)}</span>` : ''}
                    ${product.discount > 0 ? `<span class="discount-badge">-${product.discount}% OFF</span>` : ''}
                </div>
                <div class="quantity">
                    <button id="minusBtn">-</button>
                    <span id="quantityValue">1</span>
                    <button id="plusBtn">+</button>
                </div>
                <button class="order-btn" id="orderBtn">📲 Order on WhatsApp</button>
                <a href="index.html" class="back-btn">← Back to Home</a>
            </div>
        `;

        const minusBtn = document.getElementById('minusBtn');
        const plusBtn = document.getElementById('plusBtn');
        const quantitySpan = document.getElementById('quantityValue');
        const orderBtn = document.getElementById('orderBtn');

        if (minusBtn) minusBtn.onclick = () => { if (quantity > 1) { quantity--; quantitySpan.innerText = quantity; } };
        if (plusBtn) plusBtn.onclick = () => { quantity++; quantitySpan.innerText = quantity; };
        if (orderBtn) {
            orderBtn.onclick = async () => {
                const customerPhone = prompt("📞 Enter your WhatsApp number (with country code):", "+923XXXXXXXXX");
                if (!customerPhone || customerPhone.trim() === "") {
                    showToast("❌ Phone number required!", true);
                    return;
                }

                const total = finalPrice * quantity;
                const orderNumber = `ORD-${Date.now()}-${Math.random().toString(36).substr(2, 6).toUpperCase()}`;

                const message = `🛒 *NEW ORDER* 🛒%0A%0A` +
                    `📦 Order: ${orderNumber}%0A` +
                    `📞 Phone: ${customerPhone}%0A` +
                    `📱 Product: ${product.name}%0A` +
                    `🏷️ Brand: ${product.brand}%0A` +
                    `💰 Price: ₨ ${formatPrice(finalPrice)}%0A` +
                    `🔢 Qty: ${quantity}%0A` +
                    `💵 Total: ₨ ${formatPrice(total)}%0A%0A` +
                    `✅ Please confirm.`;

                window.open(`https://wa.me/${customerPhone.replace(/[^0-9]/g, '')}?text=${message}`, '_blank');
                showToast(`📲 Order sent to WhatsApp!`);

                await saveOrderToSupabase({
                    phone: customerPhone,
                    product_name: product.name,
                    payment_method: "Cash on Delivery"
                });
            };
        }
    }
